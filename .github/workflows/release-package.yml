name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

jobs:
  test-windows:
    name: Windows Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "Batchflow.EntityFrameworkExtensions.sln"

      - name: Test library suite
        run: dotnet test "Batchflow.EntityFrameworkExtensions.sln" --configuration Release --no-restore

  test-linux-postgres:
    name: Linux PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BATCHFLOW_EFEXT_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "Batchflow.EntityFrameworkExtensions.sln"

      - name: Test library suite with PostgreSQL
        run: dotnet test "Batchflow.EntityFrameworkExtensions.sln" --configuration Release --no-restore

  pack:
    name: Pack Release Artifacts
    runs-on: ubuntu-latest
    needs:
      - test-windows
      - test-linux-postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "Batchflow.EntityFrameworkExtensions.sln"

      - name: Derive package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=0.1.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: dotnet build "src/Batchflow.EntityFrameworkExtensions/Batchflow.EntityFrameworkExtensions.csproj" --configuration Release --no-restore

      - name: Pack
        run: dotnet pack "src/Batchflow.EntityFrameworkExtensions/Batchflow.EntityFrameworkExtensions.csproj" --configuration Release --no-build --output artifacts -p:Version=${{ steps.version.outputs.package_version }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batchflow-entityframeworkextensions-release
          path: artifacts/*

      - name: Publish to NuGet
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ env.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbol package to NuGet
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          if compgen -G "artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push "artifacts/*.snupkg" --api-key "${{ env.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No symbol package found; skipping symbol publish."
          fi
